<!DOCTYPE html>
<html lang="it">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>LucaMoneyManager</title>
  <link rel="stylesheet" href="css/style.css">
</head>
<body>

<!-- ── RESIZE HANDLES ── -->
<div class="rh rh-n"  data-dir="n"></div>
<div class="rh rh-s"  data-dir="s"></div>
<div class="rh rh-e"  data-dir="e"></div>
<div class="rh rh-w"  data-dir="w"></div>
<div class="rh rh-ne" data-dir="ne"></div>
<div class="rh rh-nw" data-dir="nw"></div>
<div class="rh rh-se" data-dir="se"></div>
<div class="rh rh-sw" data-dir="sw"></div>

<div class="app">

  <!-- ── SIDEBAR ── -->
  <aside class="sidebar">
    <div class="sidebar-logo">
      <span class="logo-icon">💰</span>
      <span class="logo-text">MoneyManager</span>
    </div>

    <nav class="sidebar-nav">
      <a class="nav-item active" data-page="dashboard">
        <span class="nav-icon">📊</span><span>Dashboard</span>
      </a>
      <a class="nav-item" data-page="transactions">
        <span class="nav-icon">💳</span><span>Transazioni</span>
      </a>
      <a class="nav-item" data-page="accounts">
        <span class="nav-icon">🏦</span><span>Conti</span>
      </a>
      <a class="nav-item" data-page="budgets">
        <span class="nav-icon">🎯</span><span>Budget</span>
      </a>
      <a class="nav-item" data-page="portfolio">
        <span class="nav-icon">📈</span><span>Titoli</span>
      </a>
      <a class="nav-item" data-page="analytics">
        <span class="nav-icon">📋</span><span>Reports</span>
      </a>
      <div class="nav-group" id="navGroupReports">
        <a class="nav-item" data-page="reports" id="navReports" onclick="toggleReportsGroup(event)">
          <span class="nav-icon">📊</span>
          <span style="flex:1">Filtri</span>
          <span class="nav-group-arrow" id="navReportsArrow">▶</span>
        </a>
        <div class="nav-sub" id="navReportsSub" style="display:none">
          <div id="sidebarReportsList"></div>
          <a class="nav-sub-item nav-sub-new" onclick="showReportModal()">
            <span class="nav-icon" style="font-size:12px">＋</span>
            <span>Nuovo filtro</span>
          </a>
        </div>
      </div>
      <a class="nav-item" data-page="scheduled">
        <span class="nav-icon">🗓️</span><span>Pianificate</span>
      </a>
      <a class="nav-item" data-page="forecasts">
        <span class="nav-icon">🔮</span><span>Previsioni</span>
      </a>
    </nav>

    <div class="sidebar-accounts" id="sidebarAccounts"></div>

    <div class="sidebar-spacer"></div>

    <div class="sidebar-section-label">Configurazione</div>
    <nav class="sidebar-nav">
      <a class="nav-item" data-page="categories">
        <span class="nav-icon">🏷️</span><span>Categorie</span>
      </a>
      <a class="nav-item" data-page="tags">
        <span class="nav-icon">🔖</span><span>Tag</span>
      </a>
      <a class="nav-item" data-page="logviewer">
        <span class="nav-icon">📋</span><span>Log</span>
      </a>
    </nav>

    <div class="sidebar-bottom">
      <a class="nav-item" data-page="settings">
        <span class="nav-icon">⚙️</span><span>Impostazioni</span>
      </a>
    </div>
  </aside>

  <!-- ── MAIN ── -->
  <div class="main">

    <!-- Titlebar trascinabile + controlli finestra -->
    <div class="titlebar" id="titlebar">
      <div class="titlebar-title" id="pageTitle">Dashboard</div>
      <div class="titlebar-drag"></div>
      <div class="titlebar-controls">
        <button class="tb-btn tb-min" id="btnMin" title="Riduci">─</button>
        <button class="tb-btn tb-max" id="btnMax" title="Ingrandisci">□</button>
        <button class="tb-btn tb-cls" id="btnClose" title="Chiudi">✕</button>
      </div>
    </div>

    <!-- Pagine -->
    <div class="page-container">
      <div id="pg-dashboard"    class="page active"></div>
      <div id="pg-transactions" class="page"></div>
      <div id="pg-accounts"     class="page"></div>
      <div id="pg-budgets"      class="page"></div>
      <div id="pg-portfolio"    class="page"></div>
      <div id="pg-reports"      class="page"></div>
      <div id="pg-analytics"    class="page"></div>
      <div id="pg-categories"  class="page"></div>
      <div id="pg-tags"        class="page"></div>
      <div id="pg-settings"    class="page"></div>
      <div id="pg-scheduled"   class="page"></div>
      <div id="pg-forecasts"   class="page"></div>
      <div id="pg-logviewer"  class="page"></div>
    </div>
  </div>
</div>

<!-- ── MODAL ── -->
<div class="modal-overlay" id="modalOverlay">
  <div class="modal" id="modal">
    <div class="modal-header">
      <h3 class="modal-title" id="modalTitle"></h3>
      <button class="modal-close" id="modalClose">✕</button>
    </div>
    <div class="modal-body" id="modalBody"></div>
    <div class="modal-footer">
      <button class="btn btn-ghost" id="modalCancel">Annulla</button>
      <button class="btn btn-primary" id="modalConfirm">Salva</button>
    </div>
  </div>
</div>

<!-- ── CONTEXT MENU ── -->
<div id="ctxMenu" class="ctx-menu"></div>

<!-- ── TOAST ── -->
<div class="toast-container" id="toastContainer"></div>
<div id="noticeStack"></div>

<script src="js/vendor/chart.min.js"></script>
<script src="js/app.js"></script>
</body>
</html>
